apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: microservices-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
      - name: eureka
        image: saxenaaayush9000/eureka-service:latest
        ports:
        - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: microservices-app
spec:
  selector:
    app: eureka
  ports:
    - port: 8761