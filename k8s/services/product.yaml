apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: microservices-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: saxenaaayush9000/product-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/MAPPINGDB
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_PASSWORD
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://eureka:8761/eureka
        - name: SPRING_CONFIG_IMPORT
          value: optional:configserver:http://config:8888
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: microservices-app
spec:
  selector:
    app: product
  ports:
    - port: 80
      targetPort: 8081