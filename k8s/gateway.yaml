apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: microservices-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: saxenaaayush9000/gateway-service:latest
        ports:
        - containerPort: 8088
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://eureka:8761/eureka
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: microservices-app
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8088