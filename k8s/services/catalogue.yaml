apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: microservices-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogue
  template:
    metadata:
      labels:
        app: catalogue
    spec:
      containers:
      - name: catalogue
        image: saxenaaayush9000/catalog-service:latest
        ports:
        - containerPort: 8084
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://eureka:8761/eureka
        - name: SPRING_CONFIG_IMPORT
          value: optional:configserver:http://config:8888
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: microservices-app
spec:
  selector:
    app: catalogue
  ports:
    - port: 80
      targetPort: 8084