apiVersion: apps/v1
kind: Deployment
metadata:
  name: config
  namespace: microservices-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config
  template:
    metadata:
      labels:
        app: config
    spec:
      containers:
      - name: config
        image: saxenaaayush9000/config-service:latest
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: config
  namespace: microservices-app
spec:
  selector:
    app: config
  ports:
    - port: 8888